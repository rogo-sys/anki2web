<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PAGE_TITLE}}</title>
    <style>
        body {
            font-family: sans-serif;
            font-size: 140%;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            margin: 0;
            padding: 5%;
        }

        .nav-container {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 20px;
        }

        .nav-btn {
            display: inline-block;
            margin: 5px;
            padding: 10px 15px;
            background: #fff;
            color: #000;
            font-weight: bold;
            font-size: 110%;
            border: 2px solid #000;
            text-decoration: none;
            border-radius: 5px;
        }

        .active-btn {
            background: #000;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 120%;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .word-block {
            margin-bottom: 20px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 10px;
        }

        .word {
            font-weight: bold;
            font-size: 110%;
        }

        .translation {
            display: block;
            margin-top: 5px;
            background-color: #eee;
            color: #eee;
            border-radius: 4px;
            padding: 0 5px;
            transition: background-color 0.2s;
            user-select: none;
        }

        .word-block:active .translation {
            background-color: transparent;
            color: #000;
        }

        .btn {
            display: block;
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            background: #fff;
            color: #000;
            font-weight: bold;
            font-size: 120%;
            border: 2px solid #000;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    {{NAV}}

    <h1>{{TITLE}}</h1>

    {{WORDS_BLOCKS}}

    {{BOTTOM_BUTTON}}
</body>
</html>
